services:
  postgres:
    image: postgres:18
    container_name: acam-ts-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acam_ts}
      POSTGRES_USER: ${POSTGRES_USER:-acam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acam}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acam} -d ${POSTGRES_DB:-acam_ts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: acam-ts-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-acam}:${POSTGRES_PASSWORD:-acam}@postgres:5432/${POSTGRES_DB:-acam_ts}
      APP_API_PORT: ${APP_API_PORT:-3001}
      WEB_PORT: 3000
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
      - "${APP_API_PORT:-3001}:${APP_API_PORT:-3001}"

volumes:
  postgres-data:
