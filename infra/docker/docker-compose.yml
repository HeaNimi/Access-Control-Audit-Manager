services:
  postgres:
    image: postgres:18
    container_name: acam-ts-postgres
    environment:
      POSTGRES_DB: acam_ts
      POSTGRES_USER: acam
      POSTGRES_PASSWORD: acam
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acam -d acam_ts"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
